# Starship prompt matching Kun Chen's dotfiles-mac-nix style.
# Source: https://github.com/kunchenguid/dotfiles-mac-nix (nix/user.nix)

command_timeout = 1000
add_newline = false
format = "$username$hostname$directory$git_branch$git_state$git_status$cmd_duration$line_break$character"

[directory]
style = "blue"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
stashed = "≡"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
